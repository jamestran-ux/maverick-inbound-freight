services:
  - type: web
    name: maverick
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_API_KEY
        sync: false   # set in dashboard, don't commit
      - key: TERMINAL49_API_TOKEN
        sync: false   # set in dashboard, don't commit
      - key: SHIPSGO_API_TOKEN
        sync: false   # set in dashboard, don't commit
      - key: TRACKING_PROVIDER
        value: hybrid # hybrid (default) | mock | terminal49 | shipsgo — switch via dashboard, no redeploy needed
