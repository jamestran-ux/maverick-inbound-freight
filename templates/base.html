<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maverick — {% block title %}Inbound Freight{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --blue: #0C447C; --blue-d: #0A3866; --blue-l: #1E5BA8;
    --bg: #F6F8FB; --bg-alt: #F2F5FA; --card: #FFFFFF;
    --border: rgba(15,23,42,0.08); --border-strong: rgba(15,23,42,0.16);
    --text: #0F172A; --text-2: #475569; --text-3: #94A3B8;
    --crit-bg: #FCEBEB; --crit-fg: #791F1F;
    --high-bg: #FAEEDA; --high-fg: #633806;
    --med-bg:  #EEEDFE; --med-fg:  #3C3489;
    --low-bg:  #E1F5EE; --low-fg:  #085041;
    --ai-bg:   #E6F1FB; --ai-fg:   #0C447C; --ai-border: #85B7EB;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text); background: var(--bg);
    font-size: 14px; line-height: 1.5;
    font-feature-settings: 'cv02','cv03','cv04','cv11';
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    display: flex; min-height: 100vh;
  }

  /* ===== Sidebar ===== */
  aside {
    width: 240px; flex-shrink: 0; min-height: 100vh;
    background: #fff; border-right: 0.5px solid var(--border);
    padding: 22px 0; position: sticky; top: 0; align-self: flex-start;
  }
  aside .brand { padding: 0 20px 4px; }
  aside h1 {
    font-size: 19px; font-weight: 700; color: var(--blue);
    margin: 0; letter-spacing: -0.01em;
  }
  aside p.tag {
    font-size: 11px; color: var(--text-2); margin: 2px 0 22px;
    font-style: italic;
  }
  aside .group {
    padding: 14px 20px 6px; font-size: 10px; color: var(--text-3);
    font-weight: 600; letter-spacing: 0.7px; text-transform: uppercase;
  }
  aside nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px; color: var(--text); text-decoration: none;
    font-size: 13.5px; border-left: 3px solid transparent;
    transition: all 0.12s ease; font-weight: 500;
  }
  aside nav a:hover { background: var(--bg-alt); }
  aside nav a.active {
    border-left-color: var(--blue); background: var(--ai-bg);
    color: var(--ai-fg); font-weight: 600;
  }
  aside nav a .ic { width: 18px; text-align: center; opacity: 0.85; }

  /* ===== Main ===== */
  main { flex: 1; padding: 24px 32px 40px; max-width: 1400px; }
  h2 { font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  h3 { font-size: 12px; font-weight: 600; margin: 28px 0 10px;
       color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; }
  .sub { color: var(--text-2); font-size: 13px; margin: 0 0 22px; }

  /* ===== Cards ===== */
  .card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 16px;
    overflow: hidden;
  }
  .card.tight { padding: 0; }
  .card.tight .card-head {
    padding: 14px 18px; border-bottom: 0.5px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.6px;
  }

  /* ===== KPI tiles ===== */
  .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
          margin-bottom: 22px; }
  @media (max-width: 1100px) { .kpis { grid-template-columns: repeat(3, 1fr); } }
  .kpi { background: var(--card); border: 0.5px solid var(--border);
         border-radius: 10px; padding: 14px 16px; transition: all 0.15s; }
  .kpi:hover { border-color: var(--border-strong); }
  .kpi .lbl { font-size: 10px; color: var(--text-2);
              text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600; }
  .kpi .val { font-size: 26px; font-weight: 700; margin-top: 8px;
              font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .kpi.crit .val { color: var(--crit-fg); }
  .kpi.high .val { color: var(--high-fg); }
  .kpi.ok .val { color: var(--low-fg); }

  /* ===== AI panel ===== */
  .ai-card {
    background: var(--ai-bg); border: 0.5px solid var(--ai-border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
  }
  .ai-card .badge {
    display: inline-block; background: var(--blue); color: #fff;
    font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    letter-spacing: 0.6px;
  }
  .ai-card .label { font-size: 12px; font-weight: 600; color: var(--ai-fg);
                    margin-left: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .ai-card pre {
    white-space: pre-wrap; font-family: 'Inter', sans-serif; margin: 10px 0 0;
    font-size: 13px; line-height: 1.6; color: var(--ai-fg);
  }

  /* ===== Tables ===== */
  table {
    width: 100%; border-collapse: collapse; font-size: 12.5px;
    font-variant-numeric: tabular-nums;
  }
  th { text-align: left; padding: 9px 12px; border-bottom: 0.5px solid var(--border);
       font-size: 10.5px; color: var(--text-2);
       text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600;
       background: var(--bg-alt); user-select: none; }
  th[data-sort]:hover { color: var(--blue); cursor: pointer; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border);
       vertical-align: middle; }
  tr:last-child td { border-bottom: 0; }
  tr.clickable { cursor: pointer; transition: background 0.1s; }
  tr.clickable:hover { background: var(--bg-alt); }
  table.card { padding: 0; }
  td a { color: var(--blue); text-decoration: none; font-weight: 500; }
  td a:hover { text-decoration: underline; }
  .right { text-align: right; }
  .center { text-align: center; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
          font-size: 12px; }

  /* ===== Pills ===== */
  .pill {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px; letter-spacing: 0.5px;
    text-transform: uppercase; white-space: nowrap;
  }
  .pill.crit { background: var(--crit-bg); color: var(--crit-fg); }
  .pill.high { background: var(--high-bg); color: var(--high-fg); }
  .pill.med { background: var(--med-bg); color: var(--med-fg); }
  .pill.low, .pill.ok { background: var(--low-bg); color: var(--low-fg); }
  .pill.complete { background: var(--low-bg); color: var(--low-fg); }
  .pill.dispute { background: var(--high-bg); color: var(--high-fg); }
  .pill.pending { background: var(--med-bg); color: var(--med-fg); }
  .pill.blue { background: var(--ai-bg); color: var(--ai-fg); }
  .pill.gray { background: var(--bg-alt); color: var(--text-2); }

  /* ===== Buttons ===== */
  .btn {
    padding: 8px 14px; border: 0.5px solid var(--border-strong);
    border-radius: 7px; background: #fff; cursor: pointer;
    font-size: 13px; font-family: inherit; font-weight: 500;
    color: var(--text); transition: all 0.12s; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg-alt); border-color: var(--text-2); }
  .btn-primary {
    background: var(--blue); color: #fff; border-color: var(--blue);
  }
  .btn-primary:hover { background: var(--blue-d); border-color: var(--blue-d); }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed; background: var(--blue);
    border-color: var(--blue);
  }
  .btn-success { background: var(--low-fg); color: #fff; border-color: var(--low-fg); }
  .btn-success:hover { background: #064030; }
  .btn-danger { background: var(--crit-fg); color: #fff; border-color: var(--crit-fg); }
  .btn-danger:hover { background: #5a1414; }
  .btn-sm { padding: 5px 10px; font-size: 11.5px; }

  /* ===== Action cards ===== */
  .action-card {
    background: #fff; border: 0.5px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
  }
  .action-card .left { flex: 0 0 90px; }
  .action-card .body { flex: 1; min-width: 0; }
  .action-card .title { font-weight: 600; font-size: 13.5px; }
  .action-card .meta { font-size: 12px; color: var(--text-2); margin-top: 4px;
                       line-height: 1.4; }
  .action-card .saved {
    font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums;
    color: var(--text); flex-shrink: 0;
  }

  /* ===== Tabs ===== */
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab { padding: 7px 14px; border-radius: 999px; font-size: 12px;
         color: var(--text-2); text-decoration: none; font-weight: 500;
         border: 0.5px solid var(--border); transition: all 0.1s; }
  .tab:hover { background: var(--bg-alt); }
  .tab.active { background: var(--ai-bg); color: var(--ai-fg);
                border-color: var(--ai-border); font-weight: 600; }

  /* ===== Forms ===== */
  input[type=text], input[type=number], input[type=date], input[type=file],
  select, textarea {
    padding: 8px 11px; border: 0.5px solid var(--border-strong);
    border-radius: 7px; font-size: 13px; font-family: inherit;
    color: var(--text); background: #fff; outline: none;
    transition: border-color 0.1s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); }
  label { display: block; font-size: 10.5px; color: var(--text-2);
          text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
          margin-bottom: 5px; }

  /* ===== Modal ===== */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.55);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    padding: 24px; backdrop-filter: blur(2px);
  }
  .modal {
    background: #fff; border-radius: 14px; max-width: 760px; width: 100%;
    max-height: 90vh; display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal.wide { max-width: 920px; }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 22px; border-bottom: 0.5px solid var(--border);
  }
  .modal-header h3 { margin: 0; font-size: 15.5px; font-weight: 600;
                     text-transform: none; letter-spacing: 0; color: var(--text); }
  .modal-close { border: 0; background: transparent; font-size: 22px;
                 cursor: pointer; color: var(--text-2); padding: 4px 8px;
                 border-radius: 6px; }
  .modal-close:hover { background: var(--bg-alt); color: var(--text); }
  .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
  .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 14px 22px; border-top: 0.5px solid var(--border);
    background: var(--bg-alt);
  }

  /* ===== Drawer (slides from right) ===== */
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.4);
    z-index: 999; display: none;
  }
  .drawer-backdrop.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 440px;
    background: #fff; box-shadow: -10px 0 30px rgba(0,0,0,0.15);
    z-index: 1000; transform: translateX(100%);
    transition: transform 0.25s ease; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer .modal-header { background: var(--bg-alt); }
  .drawer .modal-body { padding: 16px 20px; }

  /* ===== Email block (for email drafts in modals) ===== */
  .email-block {
    background: var(--bg-alt); padding: 14px; border-radius: 8px;
    margin-bottom: 12px; border-left: 3px solid var(--blue);
  }
  .email-block .eh { font-size: 10px; color: var(--text-2);
                     text-transform: uppercase; letter-spacing: 0.6px;
                     font-weight: 600; }
  .email-block .ev { font-size: 13px; margin: 3px 0 8px; font-weight: 500; }
  .email-block pre {
    white-space: pre-wrap; font-family: inherit; margin: 6px 0 0;
    font-size: 12.5px; line-height: 1.55; color: var(--text);
  }

  /* ===== Status colors for inline text ===== */
  .neg { color: var(--crit-fg); }
  .pos { color: var(--low-fg); }

  /* ===== Kanban ===== */
  .kanban {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
    margin-bottom: 22px;
  }
  .kanban-col {
    background: var(--bg-alt); border-radius: 10px; padding: 10px;
    min-height: 200px;
  }
  .kanban-col h4 {
    margin: 0 0 8px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.7px; color: var(--text-2); font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
  }
  .kanban-card {
    background: #fff; border: 0.5px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    font-size: 12px; cursor: pointer; transition: all 0.1s;
  }
  .kanban-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .kanban-card .id { font-weight: 600; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .kanban-card .lane { font-size: 11px; color: var(--text-2); }

  /* ===== Milestone timeline ===== */
  .timeline { padding-left: 6px; }
  .timeline .mile {
    display: flex; gap: 12px; padding: 8px 0; position: relative;
  }
  .timeline .mile::before {
    content: ''; position: absolute; left: 9px; top: 22px; bottom: -8px;
    width: 2px; background: var(--border);
  }
  .timeline .mile:last-child::before { display: none; }
  .timeline .mile .dot {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    background: #fff; border: 2px solid var(--border-strong);
    position: relative; z-index: 1;
  }
  .timeline .mile.done .dot { background: var(--low-fg); border-color: var(--low-fg); }
  .timeline .mile.current .dot { background: #fff; border-color: var(--blue);
                                  box-shadow: 0 0 0 4px var(--ai-bg); }
  .timeline .mile .info { flex: 1; padding-top: 1px; }
  .timeline .mile .info .name { font-size: 13px; font-weight: 500; }
  .timeline .mile .info .ts { font-size: 11px; color: var(--text-2);
                              margin-top: 2px; }
  .timeline .mile.pending .name { color: var(--text-3); }

  /* ===== Utilities ===== */
  .flex { display: flex; }
  .flex-1 { flex: 1; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
  .mt-4 { margin-top: 16px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-3 { margin-bottom: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .items-center { align-items: center; }
  .text-muted { color: var(--text-2); }
  .text-sm { font-size: 12px; }
  .text-xs { font-size: 11px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
</style>
</head>
<body>
<aside>
  <div class="brand">
    <h1>Maverick</h1>
    <p class="tag">Inbound freight, in your control</p>
  </div>
  <nav>
    <a href="/" class="{% if active=='dashboard' %}active{% endif %}"><span class="ic">🏠</span> Dashboard</a>
    <div class="group">Load Management</div>
    <a href="/loads" class="{% if active=='loads' %}active{% endif %}"><span class="ic">📦</span> Load Visibility</a>
    <a href="/transfers" class="{% if active=='transfers' %}active{% endif %}"><span class="ic">🔁</span> Transfer Request</a>
    <div class="group">Containers</div>
    <a href="/containers" class="{% if active=='containers' %}active{% endif %}"><span class="ic">🚢</span> Containers</a>
    <div class="group">Invoice Management</div>
    <a href="/drayage-invoices" class="{% if active=='drayage' %}active{% endif %}"><span class="ic">🧾</span> Drayage Invoice</a>
    <a href="/customs-invoices" class="{% if active=='customs' %}active{% endif %}"><span class="ic">📋</span> Customs Invoice</a>
    <a href="/gl" class="{% if active=='gl' %}active{% endif %}"><span class="ic">📊</span> GL Reconciliation</a>
    <div class="group">Carriers</div>
    <a href="/rate-card" class="{% if active=='rate_card' %}active{% endif %}"><span class="ic">🤝</span> Rate Card &amp; RFQ</a>
    <a href="/scorecard" class="{% if active=='scorecard' %}active{% endif %}"><span class="ic">📈</span> Scorecard</a>
    <div class="group">Admin</div>
    <a href="/users" class="{% if active=='users' %}active{% endif %}"><span class="ic">👥</span> Users</a>
  </nav>
</aside>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
